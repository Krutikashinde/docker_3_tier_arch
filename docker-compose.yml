services:
  frontend:
    image: frontend:latest
    container_name: frontend_ct
    ports:
      - "80:80"

  backend:
    image: backend:latest
    container_name: backend_ct
    ports:
      - "5000:5000"
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:5.7
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
